baseURL = "https://banhang-chogao.github.io/reviewchanthat/"
locale = "vi-vn"
title = "Review Chân Thật"
# Interpret dates without an explicit offset (and compute .Date sorting) in
# Vietnam time so a bare front-matter date is never treated as UTC.
timeZone = "Asia/Ho_Chi_Minh"
paginate = 10
enableRobotsTXT = true
canonifyURLs = false
relativeURLs = false
[minify]
  minifyOutput = true
disableKinds = []

[build]
  writeStats = false

[security]
  [security.funcs]
    getenv = ["^GA_MEASUREMENT_ID$"]

[params]
  description = "Review thật, trải nghiệm thật, quyết định thông minh hơn."
  footer_text = "© 2026 Review Chân Thật"
  cms_publish_api = "https://veritable-content-cms-publish.tamsudev-com.workers.dev/api/cms/publish"
  # Self-hosted, privacy-first hit counter (see counter-worker/). Empty = badge hidden.
  hits_badge_url = "https://reviewchanthat-hits.tamsudev-com.workers.dev/hits.svg"
  # Image rules per blog post
  [params.image_rules]
    min_images = 2
    max_images = 0  # 0 = unlimited
    hero_required = true
    inline_images_preferred = true
    preferred_width = 800
    preferred_height = 600


[taxonomies]
  category = "categories"
  tag = "tags"
  author = "authors"
  series = "series"

[permalinks]
  posts = "/posts/:slug/"
  categories = "/:slug/"
  tags = "/tags/:slug/"
  series = "/series/:slug/"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    anchorLineNos = false
    codeFences = true
    guessSyntax = false
    hl_Lines = ""
    hl_inline = false
    lineAnchors = ""
    lineNoStart = 1
    lineNos = false
    lineNumbersInTable = true
    noClasses = false
    noHl = false
    tabWidth = 4

[mediaTypes]
  [mediaTypes."application/json"]
    suffixes = ["json"]

[outputFormats]
  [outputFormats.searchIndex]
    mediaType = "application/json"
    baseName = "search-index"
    isPlainText = true
    notAlternative = true

[outputs]
  home = ["HTML", "RSS", "SITEMAP", "searchIndex"]
  page = ["HTML"]
  section = ["HTML", "RSS"]
