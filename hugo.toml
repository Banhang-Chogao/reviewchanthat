baseURL = "https://banhang-chogao.github.io/reviewchanthat/"
languageCode = "vi-vn"
title = "Review Chân Thật"
paginate = 4
enableRobotsTXT = true
canonifyURLs = false
relativeURLs = false
minify = true
disableKinds = ["sitemap"]

[build]
  writeStats = false

[params]
  description = "Review thật, trải nghiệm thật, quyết định thông minh hơn."
  footer_text = "© 2026 Review Chân Thật"
  facebook_url = "https://facebook.com/reviewchanthat"
  youtube_url = "https://youtube.com/@reviewchanthat"

[taxonomies]
  category = "categories"
  tag = "tags"
  author = "authors"

[permalinks]
  posts = "/:slug/"
  categories = "/:slug/"
  tags = "/tags/:slug/"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    anchorLineNos = false
    codeFences = true
    guessSyntax = false
    hl_Lines = ""
    hl_inline = false
    lineAnchors = ""
    lineNoStart = 1
    lineNos = false
    lineNumbersInTable = true
    noClasses = true
    noHl = false
    tabWidth = 4

[mediaTypes]
  [mediaTypes."application/json"]
    suffixes = ["json"]

[outputFormats]
  [outputFormats.searchIndex]
    mediaType = "application/json"
    baseName = "search-index"
    isPlainText = true
    notAlternative = true

[outputs]
  home = ["HTML", "RSS", "searchIndex"]
  page = ["HTML"]
  section = ["HTML", "RSS"]
