<footer class="site-footer">
  <div class="footer-inner container">
    <div class="footer-brand">
      <img src="{{ "logo.svg" | relURL }}" alt="Veritable Content" class="footer-logo">
      <p class="footer-desc">{{ .Site.Params.description }}</p>
    </div>
    <div class="footer-links">
      <a href="{{ "about/" | relURL }}" class="footer-link" data-color="red">Về chúng tôi</a>
      <a href="{{ "privacy/" | relURL }}" class="footer-link" data-color="orange">Chính sách bảo mật</a>
      <a href="{{ "disclaimer/" | relURL }}" class="footer-link" data-color="yellow">Miễn trừ trách nhiệm</a>
      <a href="{{ "contact/" | relURL }}" class="footer-link" data-color="green">Liên hệ</a>
      <a href="{{ "sitemap.xml" | relURL }}" class="footer-link" data-color="blue">Sơ đồ trang</a>
    </div>
    <div class="footer-social">
      <span class="footer-label">Theo dõi chúng tôi</span>
      <div class="social-links">
        <a href="{{ .Site.Params.facebook_url }}" class="social-link" target="_blank" rel="noopener noreferrer">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
          Facebook
        </a>
        <a href="{{ .Site.Params.youtube_url }}" class="social-link" target="_blank" rel="noopener noreferrer">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
          YouTube
        </a>
      </div>
    </div>
    <div class="footer-copy">
      {{ with .Site.Params.footer_text }}{{ . | safeHTML }}{{ end }}
    </div>
  </div>
</footer>
