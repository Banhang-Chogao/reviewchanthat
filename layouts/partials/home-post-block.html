<article class="home-post-block">
  {{ partial "post-verified-image.html" (dict "context" . "mode" "home") }}
  <div class="home-post-block__body">
    <div class="home-post-block__meta">
      {{ range first 1 .Params.categories }}
      {{ partial "category-badge.html" . }}
      {{ end }}
      <span class="post-date">{{ .Date.Format "02/01/2006" }}</span>
    </div>
    <h2 class="home-post-block__title">
      <a href="{{ .RelPermalink }}">{{ .Title }}</a>
    </h2>
    <p class="home-post-block__excerpt">{{ .Description | plainify | truncate 120 }}</p>
  </div>
</article>
