<article class="category-post-row">
  {{ partial "post-verified-image.html" (dict "context" . "mode" "row") }}
  <div class="category-post-row__body">
    <div class="category-post-row__meta">
      {{ range first 1 .Params.categories }}
      {{ partial "category-badge.html" . }}
      {{ end }}
      <span class="post-date">{{ .Date.Format "02/01/2006" }}</span>
      <span class="post-read-time">{{ .ReadingTime }} phút đọc</span>
    </div>
    <h2 class="category-post-row__title">
      <a href="{{ .RelPermalink }}">{{ .Title }}</a>
    </h2>
    <p class="category-post-row__excerpt">{{ .Description | plainify | truncate 180 }}</p>
  </div>
</article>
