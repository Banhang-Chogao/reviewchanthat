{{- /* Display datetime: handle both pre-formatted strings (dd-mm-yyyy hh:mm:ss) and time.Time objects */ -}}
{{- $value := . -}}
{{- if $value -}}
  {{- if eq (printf "%T" $value) "string" -}}
    {{- $value -}}
  {{- else -}}
    {{- $value.Format "02-01-2006 15:04:05" -}}
  {{- end -}}
{{- end -}}
