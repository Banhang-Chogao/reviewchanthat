<a href="{{ .context.Site.Home.RelPermalink }}" class="site-logo {{ with .modifier }}{{ . }}{{ end }}" aria-label="{{ .context.Site.Title }}">
  <span class="site-logo__mark" aria-hidden="true">
    {{/* S-DNA diamond mark — outline icon in circle (institutional, not filled/cartoon) */}}
    <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" width="32" height="32">
      <circle cx="16" cy="16" r="14.25" stroke="currentColor" stroke-width="1.6"/>
      <path d="M16 5.5 L26.5 16 L16 26.5 L5.5 16 Z" stroke="currentColor" stroke-width="1.75" stroke-linejoin="round"/>
      <path d="M16 10.25 L21.75 16 L16 21.75 L10.25 16 Z" stroke="currentColor" stroke-width="1.25" stroke-linejoin="round" opacity="0.55"/>
    </svg>
  </span>
  <span class="site-logo__text">{{ .context.Site.Title }}</span>
</a>
