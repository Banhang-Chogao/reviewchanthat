<div class="table-wrap" role="region" aria-label="Scrollable table" tabindex="0">
<table{{ range $k, $v := .Attributes }}{{ if $v }} {{ printf "%s=%q" $k $v | safeHTMLAttr }}{{ end }}{{ end }}>
  {{- if .THead }}
  <thead>
    {{- range .THead }}
    <tr>
      {{- range . }}
      <th{{ with .Alignment }} style="text-align:{{ . }}"{{ end }}>{{ .Text }}</th>
      {{- end }}
    </tr>
    {{- end }}
  </thead>
  {{- end }}
  <tbody>
    {{- range .TBody }}
    <tr>
      {{- range . }}
      <td{{ with .Alignment }} style="text-align:{{ . }}"{{ end }}>{{ .Text }}</td>
      {{- end }}
    </tr>
    {{- end }}
  </tbody>
</table>
</div>
