name: Post-Merge Autofix

on:
  # Prefer Deployment Doctor as the single diagnosis/autofix brain.
  # Keep manual dispatch for emergencies.
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual trigger (doctor will still own diagnosis)"
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write
  actions: write

concurrency:
  group: post-merge-autofix-main
  cancel-in-progress: true

jobs:
  delegate-to-doctor:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Trigger Deployment Doctor
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          echo "Post-merge autofix delegates to Deployment Doctor."
          echo "Reason: ${{ inputs.reason }}"
          gh workflow run "Deployment Doctor" --ref main || {
            echo "Could not dispatch Deployment Doctor (workflow may not exist on main yet)."
            exit 0
          }
