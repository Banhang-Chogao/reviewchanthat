name: Autofix on Deploy Failure

# Manual emergency recovery only. Automatic source mutations after a failed
# deploy can race the canonical Pages pipeline and create generated-data loops.
on:
  workflow_dispatch:
    inputs:
      posts:
        description: "Space-separated affected post paths, e.g. content/posts/example.md"
        required: false
        type: string

permissions:
  contents: write
  actions: write

concurrency:
  group: autofix-on-deploy-fail
  cancel-in-progress: true

jobs:
  autofix:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          ref: main
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements-ci.txt

      - name: Install CI dependencies
        run: pip install --disable-pip-version-check -r requirements-ci.txt

      - name: Fix only selected post scope
        id: fix
        env:
          POSTS: ${{ inputs.posts }}
        run: |
          set -euo pipefail
          read -r -a post_list <<< "${POSTS:-}"
          if ((${#post_list[@]} == 0)); then
            echo "No post scope supplied; emergency workflow is report-only."
            echo "fixed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          args=()
          for post in "${post_list[@]}"; do
            args+=(--post "$post")
          done
          python3 scripts/rule.py --fix "${args[@]}"
          python3 scripts/qa_dates.py --fix-obvious "${args[@]}"
          if git diff --quiet -- "${post_list[@]}"; then
            echo "fixed=false" >> "$GITHUB_OUTPUT"
          else
            echo "fixed=true" >> "$GITHUB_OUTPUT"
            git status --short -- "${post_list[@]}"
          fi

      - name: Commit fixes if any
        if: steps.fix.outputs.fixed == 'true'
        env:
          POSTS: ${{ inputs.posts }}
        run: |
          set -euo pipefail
          read -r -a post_list <<< "$POSTS"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -- "${post_list[@]}"
          git commit -m "fix(autofix): resolve deploy failures [autofix-on-deploy-fail]"
          git push origin HEAD:main

      - name: Trigger deploy retry
        if: steps.fix.outputs.fixed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run "Deploy to GitHub Pages" --ref main

      - name: Notify if no fix is available
        if: steps.fix.outputs.fixed != 'true'
        run: echo 'No scoped fix applied; review the failed deployment manually.'
