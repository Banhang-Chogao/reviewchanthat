name: Autofix on Deploy Failure

# Triggers when Deploy to GitHub Pages fails
on:
  workflow_run:
    workflows:
      - "Deploy to GitHub Pages"
    types:
      - completed

permissions:
  contents: write
  actions: write

concurrency:
  group: autofix-on-deploy-fail
  cancel-in-progress: false

jobs:
  autofix:
    # Only run if deploy failed on main
    if: >
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Auto Conflict Remover
        continue-on-error: true
        run: python scripts/auto_conflict_remover.py --verbose

      - name: Fix Obvious Date Issues
        continue-on-error: true
        run: python scripts/qa_dates.py --fix-obvious

      - name: Check for any changes
        id: check
        run: |
          if git diff --quiet; then
            echo "fixed=false" >> "$GITHUB_OUTPUT"
          else
            echo "fixed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit fixes if any
        if: steps.check.outputs.fixed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/posts/
          git commit -m "fix(autofix): resolve deploy failures [autofix-on-deploy-fail]" || exit 0
          git push

      - name: Trigger deploy retry
        if: steps.check.outputs.fixed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "✅ Fixed issues. Triggering deploy retry..."
          gh workflow run "Deploy to GitHub Pages" --ref main

      - name: Notify if no fix available
        if: steps.check.outputs.fixed != 'true'
        run: |
          echo "⚠️ Deploy failed but no automatic fix found."
          echo "Manual review needed. Check deploy logs."
