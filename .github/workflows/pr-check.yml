name: PR Check

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pr-check-${{ github.head_ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  commitlint:
    name: Validate commit messages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Check Conventional Commits
        run: |
          echo "## ✅ Kiểm tra commit messages" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          PATTERN='^(feat|fix|docs|style|refactor|perf|test|chore|revert)(\(.+\))?: .+'
          COMMITS=$(git log origin/${{ github.event.pull_request.base.ref }}..HEAD --format="%s")
          FAILED=0
          while IFS= read -r msg; do
            if [[ -z "$msg" ]]; then continue; fi
            if [[ ! "$msg" =~ $PATTERN ]]; then
              echo "❌ \`$msg\`" >> $GITHUB_STEP_SUMMARY
              FAILED=1
            else
              echo "✅ \`$msg\`" >> $GITHUB_STEP_SUMMARY
            fi
          done <<< "$COMMITS"
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "$FAILED" -eq 1 ]; then
            echo "### ❌ Một số commit không đúng chuẩn Conventional Commits" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Định dạng: \`type(scope): message\`" >> $GITHUB_STEP_SUMMARY
            echo "- \`type\`: feat, fix, docs, style, refactor, perf, test, chore, revert" >> $GITHUB_STEP_SUMMARY
            echo "- \`scope\`: (tùy chọn) — ví dụ: posts, images, theme, ci" >> $GITHUB_STEP_SUMMARY
            echo "- \`message\`: mô tả ngắn gọn, viết thường" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          echo "### ✅ Tất cả commit đều đúng chuẩn!" >> $GITHUB_STEP_SUMMARY

  build-check:
    name: Build & QA
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.157.0
    steps:
      - uses: actions/checkout@v4

      - name: Install Hugo
        run: |
          wget -O /tmp/hugo.tar.gz "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz"
          tar -xf /tmp/hugo.tar.gz -C /tmp
          sudo mv /tmp/hugo /usr/local/bin/hugo

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Process images
        run: python scripts/process_images.py

      - name: QA blog
        run: python scripts/qa_blog.py

      - name: Build Hugo
        run: hugo --minify

      - name: Build search index
        run: python scripts/build_search_index.py

      - name: Content quality controller
        run: 'python scripts/content_controller.py --changed-only || echo "WARN: content controller check failed"'

      - name: Link audit
        run: 'python scripts/audit_links.py || echo "WARN: link audit check failed"'
