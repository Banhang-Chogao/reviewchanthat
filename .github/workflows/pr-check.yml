name: PR Check

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pr-check-${{ github.head_ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  build-check:
    name: Build & QA
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.157.0
    steps:
      - uses: actions/checkout@v4

      - name: Install Hugo
        run: |
          wget -O /tmp/hugo.tar.gz "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz"
          tar -xf /tmp/hugo.tar.gz -C /tmp
          sudo mv /tmp/hugo /usr/local/bin/hugo

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Process images
        run: python scripts/process_images.py

      - name: Slug audit
        run: python scripts/audit_slugs.py

      - name: Normalize AI summaries
        run: python scripts/normalize_ai_summaries.py --check

      - name: Content compliance
        run: python scripts/compliance.py --strict --no-public --report-json data/compliance-report.json

      - name: QA blog
        run: python scripts/qa_blog.py

      - name: Build Hugo
        run: hugo --minify --baseURL "https://banhang-chogao.github.io/reviewchanthat/"

      - name: Link audit
        run: python scripts/audit_links.py || true

      - name: Build search index
        run: python scripts/build_search_index.py
