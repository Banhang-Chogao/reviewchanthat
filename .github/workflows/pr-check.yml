name: PR Check

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]
    paths:
      - 'content/**'
      - 'layouts/**'
      - 'assets/**'
      - 'static/**'
      - 'data/**'
      - '!data/compliance-report.json'
      - '!data/content-direction*.json'
      - '!data/deployment-doctor*.json'
      - '!data/ga4_footer.json'
      - '!data/internal-links.json'
      - '!data/qa-baseline*.json'
      - '!data/rate-limit-status.json'
      - 'hugo.toml'
      - 'i18n/**'
      - 'themes/**'
      - 'requirements-ci.txt'
      - 'scripts/ci/**'
      - 'scripts/qa_blog.py'
      - 'scripts/qa_dates.py'
      - 'scripts/qa_inline_images.py'
      - 'scripts/qa_scope.py'
      - 'scripts/rule.py'
      - 'scripts/normalize_ai_summaries.py'
      - '.github/workflows/**'

permissions:
  contents: read

concurrency:
  group: pr-check-${{ github.event.pull_request.number || github.head_ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  fast-qa:
    name: Changed-content and workflow QA
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout PR (shallow)
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 2

      - name: Setup Python 3.12 with pip cache
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements-ci.txt

      - name: Install CI dependencies
        run: bash scripts/ci/timed.sh 'install CI dependencies' python3 -m pip install --disable-pip-version-check -r requirements-ci.txt

      - name: Run fast incremental QA
        run: |
          echo '| Gate | Duration | Started → Finished |' >> "$GITHUB_STEP_SUMMARY"
          echo '|---|---:|---|' >> "$GITHUB_STEP_SUMMARY"
          bash scripts/ci/timed.sh 'PR incremental QA' bash scripts/ci/pr-qa.sh
