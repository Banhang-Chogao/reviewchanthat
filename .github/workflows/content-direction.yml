name: Content Direction

# Global rule: only run AFTER "Deploy to GitHub Pages" fully completes.
# Avoids racing deploy for runners and reduces Content Direction failures
# caused by concurrent builds / incomplete main checkout during deploy.
on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - "Deploy to GitHub Pages"
    types:
      - completed

concurrency:
  group: content-direction-main
  cancel-in-progress: true

permissions:
  contents: write
  actions: write
  pull-requests: write

jobs:
  content-direction:
    # Manual dispatch always runs; after deploy only when deploy succeeded on main.
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout deployed SHA
        uses: actions/checkout@v4
        with:
          # Prefer the commit Deploy just finished; fall back to default ref on manual run.
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.163.1"
          extended: true

      - name: Generate Content Direction report
        run: |
          python scripts/content_direction.py \
            --json data/content-direction.json \
            --md reports/content-direction-report.md

      - name: QA Content Direction (data)
        run: python scripts/qa_content_direction.py

      - name: Build Hugo
        run: hugo --minify --baseURL "https://banhang-chogao.github.io/reviewchanthat/"

      - name: QA Content Direction (public)
        run: python scripts/qa_content_direction.py --public

      - name: Commit report if changed (no deploy loop)
        id: commit
        run: |
          set -euo pipefail
          # reports/** is permanently gitignored (private artifacts).
          # Only track data/content-direction.json for Hugo dashboard.
          # deploy.yml paths-ignore that JSON so this commit does not redeploy.
          if git diff --quiet -- data/content-direction.json; then
            echo "No content-direction data changes."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- data/content-direction.json
          if git diff --cached --quiet; then
            echo "Nothing staged after add (ignored or unchanged)."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "chore(content-direction): refresh report data [skip-report]"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"
