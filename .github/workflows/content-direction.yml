name: Content Direction

# Schedule policy (auto):
# - Auto runs once every 24 hours via cron (UTC).
# - Anchor (Vietnam / Asia/Ho_Chi_Minh): daily at 05:47 — first mark
#   computed from 2026-07-10 05:47+07 (≈ "now" when this policy was set).
# - Equivalent UTC cron: 47 22 * * *  (22:47 UTC = 05:47 +07 next day calendar
#   for the evening-before UTC slot; same local clock each day).
# - Does NOT run after each post / deploy / content push.
# - workflow_dispatch (manual) is always allowed and does not change the
#   24h auto cadence (manual is free; schedule keeps firing on the mark).

on:
  schedule:
    # Every 24h at 22:47 UTC ≈ 05:47 Asia/Ho_Chi_Minh
    - cron: "47 22 * * *"
  workflow_dispatch:
    inputs:
      reason:
        description: "Optional note for this manual run (does not affect auto schedule)"
        required: false
        default: "manual"

concurrency:
  group: content-direction-main
  cancel-in-progress: true

permissions:
  contents: write
  actions: write
  pull-requests: write

jobs:
  content-direction:
    # Auto: schedule only. Manual: workflow_dispatch.
    # No post-push / no after-deploy triggers.
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Log schedule policy
        run: |
          echo "event=${{ github.event_name }}"
          echo "manual_reason=${{ github.event.inputs.reason || 'n/a' }}"
          echo "policy=auto every 24h at 22:47 UTC (05:47 Asia/Ho_Chi_Minh)"
          echo "anchor=2026-07-10T05:47:00+07:00"
          TZ=Asia/Ho_Chi_Minh date '+now_vn=%Y-%m-%d %H:%M:%S %Z'
          date -u '+now_utc=%Y-%m-%d %H:%M:%S UTC'

      - name: Skip if last commit is content-direction loop guard
        id: skip
        run: |
          LAST_CD_COMMIT=$(git log -1 --grep='\[content-direction' --oneline | head -1 || echo "")
          LAST_COMMIT=$(git log -1 --oneline)
          if [ -z "$LAST_CD_COMMIT" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "$LAST_CD_COMMIT" = "$LAST_COMMIT" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Skipping: last commit is from content-direction (loop guard)"
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Setup Python
        if: steps.skip.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        if: steps.skip.outputs.skip != 'true'
        run: pip install -r requirements.txt

      - name: Setup Hugo
        if: steps.skip.outputs.skip != 'true'
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.163.1"
          extended: true

      - name: Generate Content Direction report
        if: steps.skip.outputs.skip != 'true'
        run: |
          python scripts/content_direction.py \
            --json data/content-direction.json \
            --md reports/content-direction-report.md

      - name: QA Content Direction (data)
        if: steps.skip.outputs.skip != 'true'
        run: python scripts/qa_content_direction.py

      - name: Build Hugo
        if: steps.skip.outputs.skip != 'true'
        run: hugo --minify --baseURL "https://banhang-chogao.github.io/reviewchanthat/"

      - name: QA Content Direction (public)
        if: steps.skip.outputs.skip != 'true'
        run: python scripts/qa_content_direction.py --public

      - name: Commit report if changed (no deploy loop)
        if: steps.skip.outputs.skip != 'true'
        id: commit
        run: |
          set -euo pipefail
          if git diff --quiet -- data/content-direction.json; then
            echo "No content-direction data changes."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- data/content-direction.json
          if git diff --cached --quiet; then
            echo "Nothing staged after add (ignored or unchanged)."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "chore(content-direction): refresh report data [content-direction]"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"
