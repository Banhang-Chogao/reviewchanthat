name: Content Direction

# Triggers:
# 1. After Deploy to GitHub Pages completes (normal flow)
# 2. After push to main with content/data changes (optimizer merge)
# 3. Manual dispatch
on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - "Deploy to GitHub Pages"
    types:
      - completed
  push:
    branches: [main]
    paths:
      - 'content/posts/**'
      - 'data/content-direction*.json'
      - 'data/internal-links.json'

concurrency:
  group: content-direction-main
  cancel-in-progress: true

permissions:
  contents: write
  actions: write
  pull-requests: write

jobs:
  content-direction:
    # Runs on: manual dispatch, after deploy success, or after optimizer merge
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Skip if recent content-direction commit
        id: skip
        run: |
          LAST_CD_COMMIT=$(git log -1 --grep='\[content-direction' --oneline | head -1 || echo "")
          LAST_COMMIT=$(git log -1 --oneline)
          if [ -z "$LAST_CD_COMMIT" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "$LAST_CD_COMMIT" = "$LAST_COMMIT" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Skipping: last commit is from content-direction"
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Setup Python
        if: steps.skip.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        if: steps.skip.outputs.skip != 'true'
        run: pip install -r requirements.txt

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.163.1"
          extended: true

      - name: Setup Hugo
        if: steps.skip.outputs.skip != 'true'
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.163.1"
          extended: true

      - name: Generate Content Direction report
        if: steps.skip.outputs.skip != 'true'
        run: |
          python scripts/content_direction.py \
            --json data/content-direction.json \
            --md reports/content-direction-report.md

      - name: QA Content Direction (data)
        if: steps.skip.outputs.skip != 'true'
        run: python scripts/qa_content_direction.py

      - name: Build Hugo
        if: steps.skip.outputs.skip != 'true'
        run: hugo --minify --baseURL "https://banhang-chogao.github.io/reviewchanthat/"

      - name: QA Content Direction (public)
        if: steps.skip.outputs.skip != 'true'
        run: python scripts/qa_content_direction.py --public

      - name: Commit report if changed (no deploy loop)
        if: steps.skip.outputs.skip != 'true'
        id: commit
        run: |
          set -euo pipefail
          if git diff --quiet -- data/content-direction.json; then
            echo "No content-direction data changes."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- data/content-direction.json
          if git diff --cached --quiet; then
            echo "Nothing staged after add (ignored or unchanged)."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "chore(content-direction): refresh report data [content-direction]"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"
