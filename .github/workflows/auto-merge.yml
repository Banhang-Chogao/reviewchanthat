name: Auto Merge

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled, ready_for_review]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to auto-merge"
        required: true
        type: number

permissions:
  contents: write
  pull-requests: write

env:
  # PAT so merges to main trigger downstream workflows (deploy); GITHUB_TOKEN
  # pushes are ignored by GitHub's recursive-trigger protection.
  GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

concurrency:
  group: auto-merge-global
  cancel-in-progress: false

jobs:
  evaluate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Resolve PR
        id: pr
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "number=${{ inputs.pr_number }}" >> "$GITHUB_OUTPUT"
          else
            echo "number=${{ github.event.number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Evaluate PR eligibility
        id: eval
        shell: bash
        run: |
          PR=${{ steps.pr.outputs.number }}
          if ! DATA=$(gh pr view "$PR" --json headRefName,author,state,mergeable,labels,isCrossRepository); then
            echo "::error::Failed to fetch PR #$PR"
            exit 1
          fi

          BRANCH=$(echo "$DATA" | jq -r '.headRefName')
          AUTHOR=$(echo "$DATA" | jq -r '.author.login')
          STATE=$(echo "$DATA" | jq -r '.state')
          MERGEABLE=$(echo "$DATA" | jq -r '.mergeable')
          IS_CROSS=$(echo "$DATA" | jq -r '.isCrossRepository')
          LABELS=$(echo "$DATA" | jq -r '[.labels[].name] | join(",")')

          echo "Found PR #$PR branch=$BRANCH author=$AUTHOR state=$STATE mergeable=$MERGEABLE"

          if [ "$STATE" != "OPEN" ]; then
            echo "action=skip" >> "$GITHUB_OUTPUT"; echo "reason=PR not open"; exit 0
          fi

          if echo "$LABELS" | grep -q "do-not-merge"; then
            gh pr merge --disable "$PR" 2>/dev/null || true
            echo "action=skip" >> "$GITHUB_OUTPUT"; echo "reason=do-not-merge label"; exit 0
          fi

          if [ "$IS_CROSS" = "true" ]; then
            echo "action=skip" >> "$GITHUB_OUTPUT"; echo "reason=PR from fork"; exit 0
          fi

          case "$BRANCH" in
            content/*|fix/*|autofix/*|ci/*)
              echo "action=automerge" ;;
            *)
              echo "action=skip"; echo "reason=untrusted branch: $BRANCH" ;;
          esac >> "$GITHUB_OUTPUT"

      - name: Smart label
        if: steps.eval.outputs.action == 'automerge'
        env:
          PR: ${{ steps.pr.outputs.number }}
        run: |
          BRANCH=$(gh pr view "$PR" --json headRefName --jq '.headRefName')
          AUTHOR=$(gh pr view "$PR" --json author --jq '.author.login')
          LABELS="automated,automerge"
          case "$BRANCH" in
            content/*) LABELS="$LABELS,content/new" ;;
            fix/*)     LABELS="$LABELS,fix/bug" ;;
            autofix/*) LABELS="$LABELS,autofix" ;;
            ci/*)      LABELS="$LABELS,ci/cd" ;;
          esac
          if [ "$AUTHOR" = "github-actions[bot]" ]; then
            LABELS="$LABELS,bot"
          fi
          FILES=$(gh pr diff "$PR" --name-only)
          if echo "$FILES" | grep -q "^static/images/" || echo "$FILES" | grep -q "^scripts/image"; then
            LABELS="$LABELS,image"
          fi
          if echo "$FILES" | grep -qE "^docs/|^README\.md$" && ! echo "$FILES" | grep -q "^content/"; then
            LABELS="$LABELS,docs"
          fi
          gh pr edit "$PR" --add-label "$LABELS" 2>/dev/null || true
          echo "Labels applied: $LABELS"

      - name: Auto-rebase on main if conflicted
        if: steps.eval.outputs.action == 'automerge'
        env:
          PR: ${{ steps.pr.outputs.number }}
        run: |
          MERGEABLE=$(gh pr view "$PR" --json mergeable --jq '.mergeable')
          if [ "$MERGEABLE" != "CONFLICTING" ]; then
            echo "No conflict — skipping rebase"
            exit 0
          fi

          echo "Conflict detected — attempting auto-rebase"

          BRANCH=$(gh pr view "$PR" --json headRefName --jq '.headRefName')
          git fetch origin main "$BRANCH"
          git checkout "$BRANCH"

          if git rebase origin/main; then
            echo "Rebase succeeded — force-pushing"
            git push --force-with-lease origin "$BRANCH"
          else
            echo "Rebase failed — checking for skippable commits"
            SKIPPED=0
            while git status --porcelain | grep -q "^UU"; do
              # Content conflicts: accept main's version (ours)
              git checkout --ours content/posts/*.md 2>/dev/null || true
              git checkout --ours data/*.json 2>/dev/null || true
              git checkout --ours static/ 2>/dev/null || true
              git add -A
              SKIPPED=$((SKIPPED + 1))
            done
            if git rebase --continue 2>/dev/null; then
              echo "Rebase completed after auto-resolving content conflicts"
              git push --force-with-lease origin "$BRANCH"
            else
              # Last resort: skip commits already in main
              while git rebase --skip 2>/dev/null; do
                SKIPPED=$((SKIPPED + 1))
              done
              if git push --force-with-lease origin "$BRANCH" 2>/dev/null; then
                echo "Rebase completed by skipping $SKIPPED already-merged commit(s)"
              else
                echo "Auto-rebase failed — manual intervention required"
                gh pr comment "$PR" --body "⚠️ Auto-rebase failed: manual conflict resolution needed."
                exit 1
              fi
            fi
          fi

      - name: Enable auto-merge
        if: steps.eval.outputs.action == 'automerge'
        env:
          PR: ${{ steps.pr.outputs.number }}
        run: |
          gh pr merge "$PR" --auto --squash 2>&1 || echo "Auto-merge already enabled or not applicable"

      - name: Disable auto-merge on do-not-merge
        if: steps.eval.outputs.action == 'skip'
        env:
          PR: ${{ steps.pr.outputs.number }}
        run: |
          gh pr merge --disable "$PR" 2>/dev/null || true
          echo "Auto-merge disabled for PR #$PR"
