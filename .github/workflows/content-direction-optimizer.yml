name: Content Direction Optimizer (all-safe nightly)

on:
  schedule:
    - cron: "0 17 * * *"
  workflow_dispatch:
    inputs:
      phase:
        description: "Phase to run: all-safe, metadata, links, freshness, gaps, tech-guards, plan"
        required: false
        default: "all-safe"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: content-direction-optimizer-main
  cancel-in-progress: true

jobs:
  optimize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.163.1"
          extended: true

      - name: Skip if last commit was from this bot
        id: skip
        run: |
          MSG=$(git log -1 --pretty=%B)
          if echo "$MSG" | grep -q '\[content-direction-optimizer\]'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Skipping: last commit is from Content Direction Optimizer"
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Generate Content Direction report
        if: steps.skip.outputs.skip != 'true'
        run: |
          python scripts/content_direction.py \
            --json data/content-direction.json \
            --md reports/content-direction-report.md

      - name: Phase — Metadata (seo_title + descriptions)
        if: steps.skip.outputs.skip != 'true' && (github.event.inputs.phase == 'all-safe' || github.event.inputs.phase == 'metadata')
        run: |
          python scripts/autobot_seo_title_optimizer.py --write
          python scripts/autobot_desc_optimizer.py --write

      - name: Phase — Internal links
        if: steps.skip.outputs.skip != 'true' && (github.event.inputs.phase == 'all-safe' || github.event.inputs.phase == 'links')
        run: |
          python scripts/autobot_internal_link_inserter.py --write
          python scripts/autobot_orphan_fixer.py --write

      - name: Phase — Freshness
        if: steps.skip.outputs.skip != 'true' && (github.event.inputs.phase == 'all-safe' || github.event.inputs.phase == 'freshness')
        run: |
          python scripts/autobot_content_updater.py --write

      - name: Phase — Content gaps
        if: steps.skip.outputs.skip != 'true' && (github.event.inputs.phase == 'all-safe' || github.event.inputs.phase == 'gaps')
        run: |
          python scripts/autobot_content_gap_filler.py --write

      - name: Run optimizer (scoring + report)
        if: steps.skip.outputs.skip != 'true'
        run: |
          python scripts/content_direction_optimizer.py \
            --write \
            --max-changes 30 \
            --report-json reports/content-direction-optimizer.json \
            --report-md reports/content-direction-optimizer.md

      - name: QA all-safe
        if: steps.skip.outputs.skip != 'true'
        run: |
          python scripts/qa_dates.py
          python scripts/qa_sitemap.py || true
          python scripts/qa_autobot_fixer_I.py --max-changes 30 || true

      - name: Detect changes
        if: steps.skip.outputs.skip != 'true'
        id: changes
        run: |
          git status --porcelain
          CODE_DIFF=$(git status --porcelain | grep -vE 'reports/' || true)
          if [ -n "$CODE_DIFF" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No optimization changes needed"
          fi

      - name: Loop guard
        if: steps.skip.outputs.skip != 'true' && steps.changes.outputs.has_changes == 'true'
        id: loop_guard
        run: |
          TODAY=$(TZ=Asia/Ho_Chi_Minh date +%Y%m%d)
          BRANCH="bot/content-direction-optimizer-${TODAY}"
          EXISTING=$(git ls-remote --heads origin "$BRANCH" | wc -l | tr -d ' ' || true)
          if [ "$EXISTING" -gt 0 ] && [ "${GITHUB_REF_NAME}" != "$BRANCH" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Loop guard: branch $BRANCH exists, aborting"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and create PR
        if: steps.skip.outputs.skip != 'true' && steps.changes.outputs.has_changes == 'true' && steps.loop_guard.outputs.skip != 'true'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          TODAY=$(TZ=Asia/Ho_Chi_Minh date +%Y%m%d)
          BRANCH="bot/content-direction-optimizer-${TODAY}"

          git checkout -B "$BRANCH"
          git add -A
          git commit -m "chore(content): apply Content Direction optimizer [content-direction-optimizer]" || exit 0
          git push -u origin "$BRANCH" --force-with-lease || git push -u origin "$BRANCH"

          EXISTING=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number' || true)
          if [ -n "$EXISTING" ]; then
            echo "PR already open: #$EXISTING"
            exit 0
          fi

          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "chore(content): apply Content Direction optimizer" \
            --body "Nightly Content Direction all-safe run. Score targets 100. [content-direction-optimizer]" \
            --label automerge --label automated --label content-direction --label seo

          # Auto-resolve conflicts if any
          sleep 10
          PR_NUMBER=$(gh pr view "$BRANCH" --json number --jq '.number' || true)
          if [ -n "$PR_NUMBER" ]; then
            CONFLICT=$(gh pr view "$PR_NUMBER" --json mergeable --jq '.mergeable' || true)
            if [ "$CONFLICT" = "CONFLICTING" ]; then
              echo "PR #$PR_NUMBER has conflicts — auto-resolving..."
              python scripts/auto_resolve_pr_conflicts.py "$BRANCH"
              sleep 5
              gh pr merge "$PR_NUMBER" --squash --subject "fix: auto-resolve conflicts [content-direction-optimizer]" --body "Auto-resolved by keeping main version." || true
            fi
          fi || true