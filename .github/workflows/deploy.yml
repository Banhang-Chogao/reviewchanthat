name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - 'reports/**'
      - 'data/deployment-snapshot.json'
      - 'data/deployment-doctor.json'
      - 'data/deployment-doctor-attempts.json'
      - 'data/content-direction.json'
      - 'data/qa-baseline.json'
      - 'data/qa-baseline-debt.json'
      - 'data/rate-limit-status.json'
      - 'data/compliance-report.json'
      - 'data/ga4_footer.json'
      - 'data/content-direction-score.json'
      - 'data/content-direction-optimizer-summary.json'
      - 'reports/content-direction-optimizer.json'
      - 'reports/content-direction-optimizer.md'
      - 'data/internal-links.json'
      - 'reports/content-direction-optimizer.json'
      - 'reports/content-direction-optimizer.md'
      - '.github/workflows/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.163.1'
          extended: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Auto-fix frontmatter conflicts (run first!)
        continue-on-error: true
        run: python scripts/auto_conflict_remover.py --verbose

      - name: Normalize AI summaries
        run: python scripts/normalize_ai_summaries.py --check

      - name: Generate Content Direction report
        run: |
          python scripts/content_direction.py \
            --json data/content-direction.json \
            --md reports/content-direction-report.md
          python scripts/qa_content_direction.py

      - name: Write build-info for live verification
        run: |
          python - <<'PY'
          import json, subprocess
          from pathlib import Path
          import sys
          sys.path.insert(0, "scripts/lib")
          from dates import format_vietnam_datetime, now_vietnam
          sha = subprocess.check_output(["git", "rev-parse", "HEAD"], text=True).strip()
          now = now_vietnam()
          payload = {
              "sha": sha,
              "short_sha": sha[:7],
              "generated_at": now.isoformat(),
              "generated_at_display": format_vietnam_datetime(now),
              "repo": "Banhang-Chogao/reviewchanthat",
              "site": "https://banhang-chogao.github.io/reviewchanthat/",
          }
          Path("static/build-info.json").parent.mkdir(parents=True, exist_ok=True)
          Path("static/build-info.json").write_text(
              json.dumps(payload, ensure_ascii=False, indent=2) + "\n", encoding="utf-8"
          )
          print("Wrote static/build-info.json", payload["short_sha"])
          PY

      - name: Build Hugo
        run: hugo --minify

      - name: QA Content Direction (public)
        run: python scripts/qa_content_direction.py --public

      - name: Generate optimizer score
        run: |
          python scripts/content_direction_optimizer.py \
            --write \
            --max-changes 0 \
            --report-json reports/content-direction-optimizer.json \
            --report-md reports/content-direction-optimizer.md || true

      - name: Generate posts-only sitemap
        run: python scripts/gen_posts_sitemap.py --public-dir public

      - name: QA dates
        run: python scripts/qa_dates.py

      - name: QA internal links
        run: python scripts/qa_internal_links.py --public-dir public || true

      - name: QA sitemap
        run: python scripts/qa_sitemap.py

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  submit-google-sitemap:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Submit posts sitemap to Google Search Console
        continue-on-error: true
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
          GSC_SITE_URL: "https://banhang-chogao.github.io/reviewchanthat/"
          GSC_SITEMAP_URL: "https://banhang-chogao.github.io/reviewchanthat/sitemap-posts.xml"
        run: python scripts/submit_google_sitemap.py
