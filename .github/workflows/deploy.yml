name: Deploy to GitHub Pages

run-name: Pages deploy ${{ github.ref_name }} @ ${{ github.sha }}

on:
  push:
    branches: [main]
    # Generated reports, analytics, and doctor snapshots are deliberately not
    # release triggers. Site sources and release-gate code remain covered.
    paths:
      - 'content/**'
      - 'layouts/**'
      - 'assets/**'
      - 'static/**'
      - 'data/**'
      - '!data/compliance-report.json'
      - '!data/content-direction*.json'
      - '!data/deployment-doctor*.json'
      - '!data/ga4_footer.json'
      - '!data/internal-links.json'
      - '!data/qa-baseline*.json'
      - '!data/rate-limit-status.json'
      - 'hugo.toml'
      - 'i18n/**'
      - 'themes/**'
      - 'requirements-ci.txt'
      - 'scripts/ci/**'
      - 'scripts/gen_posts_sitemap.py'
      - 'scripts/lib/**'
      - 'scripts/normalize_ai_summaries.py'
      - 'scripts/qa_dates.py'
      - 'scripts/qa_hero_images.py'
      - 'scripts/qa_inline_images.py'
      - 'scripts/qa_internal_links.py'
      - 'scripts/qa_sitemap.py'
      - 'scripts/rule.py'
      - 'scripts/update-version.sh'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  # A newer main commit supersedes an older Pages build; do not queue stale
  # releases behind it.
  group: pages-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  HUGO_VERSION: '0.163.1'
  PYTHON_VERSION: '3.12'
  HUGO_CACHEDIR: ${{ github.workspace }}/.hugo_cache
  SITE_URL: https://banhang-chogao.github.io/reviewchanthat

jobs:
  build:
    name: QA and build once
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout source (shallow)
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 1

      - name: Setup Python ${{ env.PYTHON_VERSION }} with pip cache
        uses: actions/setup-python@v5.6.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements-ci.txt

      - name: Install release-gate dependencies
        run: bash scripts/ci/timed.sh 'install CI dependencies' python3 -m pip install --disable-pip-version-check -r requirements-ci.txt

      - name: Cache Hugo build cache
        uses: actions/cache@v4.2.3
        with:
          path: ${{ env.HUGO_CACHEDIR }}
          key: hugo-${{ runner.os }}-${{ env.HUGO_VERSION }}-${{ hashFiles('hugo.toml', 'layouts/**', 'assets/**', 'requirements-ci.txt', 'scripts/ci/**') }}

      - name: Setup Hugo ${{ env.HUGO_VERSION }} extended
        uses: peaceiris/actions-hugo@v3.1.0
        with:
          hugo-version: ${{ env.HUGO_VERSION }}
          extended: true

      - name: Critical source QA (parallel)
        run: |
          echo '| Gate | Duration | Started → Finished |' >> "$GITHUB_STEP_SUMMARY"
          echo '|---|---:|---|' >> "$GITHUB_STEP_SUMMARY"
          bash scripts/ci/timed.sh 'critical source QA' bash scripts/ci/critical-qa.sh

      - name: Write build metadata
        run: |
          bash scripts/ci/timed.sh 'write build metadata' python3 - <<'PY'
          import json
          import os
          from pathlib import Path
          import sys
          sys.path.insert(0, "scripts/lib")
          from dates import format_vietnam_datetime, now_vietnam

          sha = os.environ["GITHUB_SHA"]
          now = now_vietnam()
          payload = {
              "sha": sha,
              "short_sha": sha[:7],
              "generated_at": now.isoformat(),
              "generated_at_display": format_vietnam_datetime(now),
              "repo": "Banhang-Chogao/reviewchanthat",
              "site": "https://banhang-chogao.github.io/reviewchanthat/",
          }
          path = Path("static/build-info.json")
          path.parent.mkdir(parents=True, exist_ok=True)
          path.write_text(json.dumps(payload, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
          print(f"Wrote {path} for {payload['short_sha']}")
          PY

      - name: Update version badge
        run: bash scripts/ci/timed.sh 'update version badge' bash scripts/update-version.sh

      - name: Build Hugo once
        env:
          GA_MEASUREMENT_ID: ${{ secrets.GA_MEASUREMENT_ID || 'G-JCSEKBLP40' }}
        run: bash scripts/ci/timed.sh 'Hugo build' hugo --minify --baseURL "${SITE_URL}/"

      - name: Generate posts-only sitemap from the build
        run: bash scripts/ci/timed.sh 'generate posts sitemap' python3 scripts/gen_posts_sitemap.py --public-dir public

      - name: Public build QA (parallel)
        run: bash scripts/ci/timed.sh 'public build QA' bash scripts/ci/public-qa.sh

      - name: Upload Pages artifact from the single build
        uses: actions/upload-pages-artifact@v3.0.1
        with:
          path: ./public

  deploy:
    name: Deploy and smoke test
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy Pages artifact
        id: deployment
        uses: actions/deploy-pages@v4.0.5

      - name: Live smoke check (homepage, build SHA, 404)
        env:
          EXPECTED_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          start=$(date +%s)
          started_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          base="${SITE_URL%/}"
          curl --fail --silent --show-error --location --retry 10 --retry-delay 5 --retry-all-errors "$base/" -o /dev/null
          curl --fail --silent --show-error --location --retry 10 --retry-delay 5 --retry-all-errors "$base/build-info.json" -o /tmp/build-info.json
          grep -F "\"sha\": \"$EXPECTED_SHA\"" /tmp/build-info.json
          status=$(curl --silent --show-error --location --output /dev/null --write-out "%{http_code}" "$base/ci-smoke-not-found-${GITHUB_RUN_ID}/")
          test "$status" = 404
          finished_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          duration=$(( $(date +%s) - start ))
          echo "Live smoke passed: SHA=${EXPECTED_SHA:0:7}, missing-page-status=$status"
          echo "live smoke check: ${duration}s (${started_at} → ${finished_at})" >> "$GITHUB_STEP_SUMMARY"
