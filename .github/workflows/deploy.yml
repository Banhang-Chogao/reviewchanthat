name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - 'reports/**'
      - 'data/deployment-snapshot.json'
      - 'data/content-direction.json'
      - 'data/qa-baseline.json'
      - 'data/qa-baseline-debt.json'
      - 'data/rate-limit-status.json'
      - 'data/compliance-report.json'
      - 'data/ga4_footer.json'
      - '.github/workflows/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.163.1'
          extended: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Normalize AI summaries
        run: python scripts/normalize_ai_summaries.py --check

      - name: Build Hugo
        run: hugo --minify

      - name: Generate posts-only sitemap
        run: python scripts/gen_posts_sitemap.py --public-dir public

      - name: QA sitemap
        run: python scripts/qa_sitemap.py

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  submit-google-sitemap:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Submit posts sitemap to Google Search Console
        continue-on-error: true
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
          GSC_SITE_URL: "https://banhang-chogao.github.io/reviewchanthat/"
          GSC_SITEMAP_URL: "https://banhang-chogao.github.io/reviewchanthat/sitemap-posts.xml"
        run: python scripts/submit_google_sitemap.py
