name: crawl-doctor

on:
  workflow_run:
    workflows: [deploy]
    types: [completed]
    branches: [main]
  schedule:
    - cron: '15 18 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  actions: read

concurrency:
  group: crawl-doctor
  cancel-in-progress: true

jobs:
  crawl-doctor:
    if: github.event.workflow_run.conclusion == 'success' || github.event_name != 'workflow_run'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Build Hugo
        run: |
          curl -L https://github.com/gohugoio/hugo/releases/download/v0.120.0/hugo_0.120.0_linux-amd64.tar.gz | tar xz
          ./hugo --minify

      - name: Detect changed URLs
        id: changed
        run: |
          # Get changed posts from git
          CHANGED=$(git diff HEAD~1 HEAD --name-only --diff-filter=AM -- 'content/posts/*.md' || true)
          if [ -z "$CHANGED" ]; then
            echo "No changes detected"
            echo "urls_file=" >> $GITHUB_OUTPUT
          else
            echo "$CHANGED" > /tmp/changed-files.txt
            # Convert to URLs
            python3 - <<'EOF'
          import sys
          with open('/tmp/changed-files.txt') as f:
              for line in f:
                  slug = line.strip().split('/')[-1].replace('.md', '')
                  print(f"https://banhang-chogao.github.io/reviewchanthat/posts/{slug}/")
          EOF
            echo "urls_file=/tmp/changed-urls.txt" >> $GITHUB_OUTPUT
          fi

      - name: Run Content Publish Bot
        run: |
          mkdir -p data reports
          python3 scripts/content_publish_bot.py --sha ${{ github.sha }} --write

      - name: Submit IndexNow
        if: vars.INDEXNOW_KEY != ''
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
        run: |
          python3 scripts/indexnow_submit.py

      - name: Collect GSC Data
        if: vars.GSC_SITE_URL != ''
        env:
          GSC_SITE_URL: ${{ vars.GSC_SITE_URL }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS }}
        run: |
          python3 scripts/gsc_crawl_collector.py || echo "GSC collection skipped"

      - name: Build Crawl Health Dashboard
        run: |
          python3 scripts/build_crawl_health.py

      - name: Run Organic Opportunity Bot
        run: |
          python3 scripts/organic_opportunity_bot.py

      - name: Run Crawl Doctor
        run: |
          python3 scripts/crawl_doctor.py \
            --check \
            --report-json reports/crawl-doctor-report.json \
            --report-md reports/crawl-doctor-report.md

      - name: QA Crawl System
        run: |
          python3 scripts/qa_crawl_system.py

      - name: Create PR if changes
        if: always()
        run: |
          git config user.name "crawl-doctor"
          git config user.email "crawl-doctor@reviewchanthat.local"

          # Check if tracked files changed
          CHANGED_FILES=$(git status --porcelain data/ reports/ .github/workflows/crawl-doctor.yml 2>/dev/null | wc -l)

          if [ "$CHANGED_FILES" -gt 0 ]; then
            BRANCH="bot/crawl-doctor-$(date +%Y%m%d-%H%M%S)"
            git checkout -b "$BRANCH"
            git add data/ reports/ .github/workflows/crawl-doctor.yml
            git commit -m "chore(seo): crawl-doctor dashboard update [crawl-doctor]" || exit 0

            git push origin "$BRANCH" 2>&1 | grep -q "already exists" && exit 0

            gh pr create \
              --title "chore(seo): crawl-doctor dashboard update" \
              --body "Automated crawl health monitoring and opportunity detection.

- Content Publish Bot: verified live status, metadata, indexability
- IndexNow Submission: notified Bing of changes
- GSC Collector: collected search analytics and index status
- Crawl Health Dashboard: aggregated monitoring data
- Organic Opportunity Bot: generated improvement recommendations
- Crawl Doctor: ran health checks and compliance audits
- QA: validated all checks passed

[crawl-doctor]" \
              --label "automerge" \
              --label "automated" \
              --label "seo" \
              --label "crawl"
          else
            echo "No changes to tracked files"
          fi

      - name: Merge PR when ready
        if: always()
        run: |
          # Auto-merge PRs labeled 'automerge' after QA passes
          PR_NUMBER=$(gh pr list --search "is:pr is:open label:automerge [crawl-doctor]" --json number --jq '.[0].number' 2>/dev/null)

          if [ ! -z "$PR_NUMBER" ]; then
            echo "Found PR #$PR_NUMBER, attempting auto-merge..."
            gh pr merge "$PR_NUMBER" --squash --subject "chore(seo): crawl-doctor dashboard update" || true
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
