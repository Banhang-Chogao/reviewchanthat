name: GA4 Footer Stats

on:
  # TEMPORARILY DISABLED: scheduled run
  # To re-enable: uncomment schedule section below
  # schedule:
  #   - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: ga4-footer
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch GA4 footer metrics
        env:
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
        run: python scripts/fetch_ga4_footer.py

      - name: Commit updated GA4 footer data
        id: commit
        run: |
          if git diff --quiet -- data/ga4_footer.json; then
            echo "No GA4 footer changes to commit."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/ga4_footer.json
          git commit -m "chore(ga4): refresh footer traffic summary"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Trigger site deploy
        if: success() && steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run "Deploy to GitHub Pages" --ref main