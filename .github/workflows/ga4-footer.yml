name: GA4 Footer Stats

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: ga4-footer
  cancel-in-progress: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch GA4 footer metrics
        env:
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
        run: python scripts/fetch_ga4_footer.py

      - name: Commit updated GA4 footer data
        id: commit
        run: |
          if git diff --quiet -- data/ga4_footer.json; then
            echo "No GA4 footer changes to commit."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/ga4_footer.json
          git commit -m "chore(ga4): refresh footer traffic summary"
          # Push with rebase-retry so concurrent pushes to main (deploys/other bots)
          # don't fail this job. GA4 only touches data/ga4_footer.json, so rebasing is
          # conflict-free; --autostash guards any stray change.
          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:main; then
              echo "changed=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "Push rejected (attempt $attempt/5); rebasing onto latest origin/main…"
            git fetch origin main
            git rebase --autostash origin/main || { git rebase --abort || true; }
            sleep $((attempt * 3))
          done
          echo "GA4 push failed after 5 attempts." >&2
          exit 1

      - name: Trigger site deploy
        if: success() && steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run "Deploy to GitHub Pages" --ref main
