name: Refresh All Images

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-images
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write .env from secrets
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
        run: |
          {
            echo "PEXELS_API_KEY=${PEXELS_API_KEY}"
            echo "PIXABAY_API_KEY=${PIXABAY_API_KEY}"
            echo "UNSPLASH_ACCESS_KEY=${UNSPLASH_ACCESS_KEY}"
          } > .env

      - name: Refresh all images through gate
        run: python scripts/refresh_all_images.py

      - name: Commit refreshed images
        run: |
          if git diff --quiet; then
            echo "No image changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/posts data/images.json data/image-source-cache.json data/image-selection-report.json data/image-candidates static/images/posts static/images/posts-src reports
          git commit -m "chore(images): refresh all post thumbnails via relevance gate"
          git push

      - name: Trigger site deploy
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run "Deploy to GitHub Pages" --ref main