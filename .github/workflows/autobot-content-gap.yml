name: autobot_content_gap (nightly)

on:
  schedule:
    - cron: "0 21 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: autobot-content-gap-main
  cancel-in-progress: true

env:
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  content_gap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Skip if last commit was from this bot
        id: skip
        run: |
          MSG=$(git log -1 --pretty=%B)
          if echo "$MSG" | grep -q '\[autobot-content-gap\]'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Skipping: last commit is from autobot_content_gap"
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Run autobot_content_gap
        if: steps.skip.outputs.skip != 'true'
        id: optimize
        run: |
          python scripts/autobot_content_gap_filler.py --write

      - name: Detect changes
        if: steps.skip.outputs.skip != 'true'
        id: changes
        run: |
          git status --porcelain
          CODE_DIFF=$(git status --porcelain | grep -vE 'reports/' || true)
          if [ -n "$CODE_DIFF" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No changes needed"
          fi

      - name: Commit and push to main
        if: steps.skip.outputs.skip != 'true' && steps.changes.outputs.has_changes == 'true'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore(content): autobot_content_gap nightly run [autobot-content-gap]" || exit 0
          git pull --rebase origin main
          git push origin main
